<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons / App icons -->
    <link rel="icon" type="image/png" href="/PANTRY-LOGO.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/PANTRY-LOGO.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff69b4" />
    
    <!-- Default meta (route-level SEO sets canonical/OG/Twitter/description per page) -->
    <title>LUNA SEN PANTRY</title>
    <meta name="description" content="Independent SEN-priority food support across Wirral, Merseyside. Emergency food help, pantry support and family-first care." />
    <meta name="robots" content="index,follow" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LUNA" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Additional Icons -->
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>LUNA SEN PANTRY</h1>
        <p>This website requires JavaScript to function properly.</p>
        <p>Please enable JavaScript in your browser settings.</p>
        <p><strong>Need immediate help?</strong></p>
        <p>Call us directly: <a href="tel:07718851362">07718851362</a></p>
      </div>
    </noscript>
    <div id="luna-splash" class="luna-splash--boot-hidden" aria-hidden="true">
      <div class="luna-splash__inner">
        <img class="luna-splash__logo" src="/PANTRY-LOGO.png" alt="" />
        <div class="luna-splash__text">Signing in…</div>
      </div>
    </div>
    <style>
      /* Hidden on first paint — shown only during /admin sign-in via authSplash.js */
      #luna-splash.luna-splash--boot-hidden {
        display: none !important;
      }

      #luna-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #ff69b4 0%, #7ad7f0 100%);
        z-index: 9999;
        transition: opacity 240ms ease, visibility 240ms ease;
      }

      #luna-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .luna-splash__inner {
        text-align: center;
        padding: 24px;
      }

      .luna-splash__logo {
        width: min(160px, 42vw);
        height: auto;
        display: block;
        margin: 0 auto 14px;
        border-radius: 24px;
        box-shadow:
          0 18px 45px rgba(0, 0, 0, 0.22),
          0 0 0 10px rgba(255, 255, 255, 0.12);
      }

      .luna-splash__text {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.96);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
        font-size: 0.95rem;
      }

      @media (prefers-reduced-motion: reduce) {
        #luna-splash {
          transition: none;
        }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
