# Same app build as Firebase Hosting: `npm run build` → `dist/`. This file only affects Netlify.
# To stop using Netlify build minutes: Netlify → Site → Build & deploy → Stop builds, or disconnect the Git repo.
# Deploy via Firebase instead: `npm run deploy:hosting` (uses your local .env.local at build time).

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
